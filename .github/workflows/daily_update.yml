name: Daily FPL Elite Update

on:
  schedule:
    # تشغيل كل يوم الساعة 5:00 صباحاً بتوقيت جرينتش
    - cron: '0 5 * * *'
  workflow_dispatch: # يسمح لك بتشغيله يدوياً أيضاً إذا أردت

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FPL Script
        run: python your_script_name.py # استبدل 'top_10_players.py' باسم ملف الكود الخاص بك

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add fpl_elite_data.json fpl_elite_data.db
          git commit -m "Update FPL Elite Data - $(date)" || echo "No changes to commit"
          git push
